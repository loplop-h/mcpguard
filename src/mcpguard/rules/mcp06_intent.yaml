- id: MCP06-001
  info:
    name: SSRF-Prone URL in Config
    severity: high
    owasp: MCP06
    description: MCP server URL points to cloud metadata endpoint or internal network, enabling SSRF attacks
    remediation: Use external URLs only. Block access to metadata endpoints and private IP ranges.
    cwe: CWE-918
  detection:
    target: config
    scope: url
    match:
      type: regex
      patterns:
        - '169\.254\.169\.254'
        - 'metadata\.google\.internal'
        - 'metadata\.azure\.com'
        - '10\.\d+\.\d+\.\d+'
        - '172\.(1[6-9]|2\d|3[01])\.\d+\.\d+'
        - '192\.168\.\d+\.\d+'
