- id: MCP01-001
  info:
    name: Hardcoded AWS Access Key
    severity: critical
    owasp: MCP01
    description: AWS access key hardcoded in MCP server config
    remediation: Use environment variable references (${AWS_ACCESS_KEY_ID}) instead of hardcoding credentials
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: regex
      patterns:
        - 'AKIA[0-9A-Z]{16}'

- id: MCP01-002
  info:
    name: Hardcoded OpenAI API Key
    severity: critical
    owasp: MCP01
    description: OpenAI API key hardcoded in MCP server config
    remediation: Use environment variable references (${OPENAI_API_KEY}) instead of hardcoding
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: regex
      patterns:
        - 'sk-[a-zA-Z0-9\-]{20,}'

- id: MCP01-003
  info:
    name: Hardcoded GitHub PAT
    severity: critical
    owasp: MCP01
    description: GitHub personal access token hardcoded in MCP server config
    remediation: Use environment variable references (${GITHUB_TOKEN}) instead of hardcoding
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: regex
      patterns:
        - 'ghp_[a-zA-Z0-9]{36}'
        - 'github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}'
        - 'gho_[a-zA-Z0-9]{36}'
        - 'ghs_[a-zA-Z0-9]{36}'

- id: MCP01-004
  info:
    name: Hardcoded Anthropic API Key
    severity: critical
    owasp: MCP01
    description: Anthropic API key hardcoded in MCP server config
    remediation: Use environment variable references (${ANTHROPIC_API_KEY}) instead of hardcoding
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: regex
      patterns:
        - 'sk-ant-[a-zA-Z0-9\-]{20,}'

- id: MCP01-005
  info:
    name: Hardcoded Stripe Key
    severity: critical
    owasp: MCP01
    description: Stripe API key hardcoded in MCP server config
    remediation: Use environment variable references instead of hardcoding
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: regex
      patterns:
        - 'sk_live_[a-zA-Z0-9]{24,}'
        - 'rk_live_[a-zA-Z0-9]{24,}'

- id: MCP01-006
  info:
    name: Hardcoded Bearer Token in Headers
    severity: critical
    owasp: MCP01
    description: Bearer token hardcoded in HTTP headers instead of using variable reference
    remediation: Use environment variable references or input variables for tokens
    cwe: CWE-798
  detection:
    target: config
    scope: headers
    match:
      type: regex
      patterns:
        - 'Bearer\s+[A-Za-z0-9\-_.]{20,}'

- id: MCP01-007
  info:
    name: High-Entropy Secret in Environment
    severity: high
    owasp: MCP01
    description: Environment variable contains a high-entropy string that may be a secret
    remediation: Use environment variable references (${VAR_NAME}) instead of inline secrets
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: entropy
      threshold: 4.5
      min_length: 20

- id: MCP01-008
  info:
    name: Generic Secret Pattern
    severity: high
    owasp: MCP01
    description: Environment variable value matches a common secret pattern
    remediation: Use environment variable references instead of hardcoding secrets
    cwe: CWE-798
  detection:
    target: config
    scope: env_values
    match:
      type: regex
      patterns:
        - 'eyJ[a-zA-Z0-9\-_]+\.eyJ[a-zA-Z0-9\-_]+'
        - 'xox[bporas]-[a-zA-Z0-9\-]{10,}'
        - 'hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+'
